# Project-wide Gradle settings
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true

# Mapbox SDK download token (secret token starting with sk.)
# ⚠️  Do NOT replace this placeholder with a real sk.* token and commit it.
# Real token is written by CI from MAPBOX_DOWNLOADS_TOKEN GitHub Secret,
# or locally override by adding MAPBOX_DOWNLOADS_TOKEN=sk.*** to local.properties
# (which is gitignored). Never commit a real sk.* token here.
MAPBOX_DOWNLOADS_TOKEN=YOUR_MAPBOX_SECRET_TOKEN
