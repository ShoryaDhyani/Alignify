name: Android Build & Release

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties
          echo "MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }}" >> local.properties

      - name: Inject Mapbox downloads token into gradle.properties
        run: |
          sed -i "s|YOUR_MAPBOX_SECRET_TOKEN|${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}|g" gradle.properties

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --parallel --build-cache

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    environment: myapp
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties
          echo "MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }}" >> local.properties

      - name: Inject Mapbox downloads token into gradle.properties
        run: |
          sed -i "s|YOUR_MAPBOX_SECRET_TOKEN|${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}|g" gradle.properties

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json

      - name: Check for signing secrets
        id: check_secrets
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "has_signing=true" >> $GITHUB_OUTPUT
          else
            echo "has_signing=false" >> $GITHUB_OUTPUT
          fi

      - name: Decode Keystore
        if: steps.check_secrets.outputs.has_signing == 'true'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release.keystore

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Signed Release APK
        if: steps.check_secrets.outputs.has_signing == 'true'
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --parallel --build-cache

      - name: Build Debug APK (unsigned fallback)
        if: steps.check_secrets.outputs.has_signing != 'true'
        run: ./gradlew assembleDebug --parallel --build-cache

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release (Signed)
        if: steps.check_secrets.outputs.has_signing == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: Alignify v${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true

      - name: Create GitHub Release (Debug fallback)
        if: steps.check_secrets.outputs.has_signing != 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: Alignify v${{ steps.get_version.outputs.VERSION }} (Debug)
          body: |
            ⚠️ **This is an unsigned debug build.**
            To produce signed releases, add these repository secrets:
            - `KEYSTORE_BASE64` — base64-encoded `.jks` keystore
            - `KEYSTORE_PASSWORD`
            - `KEY_ALIAS`
            - `KEY_PASSWORD`
          draft: false
          prerelease: true
          files: app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
